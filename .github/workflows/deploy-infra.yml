# =============================================================================
# Infrastructure Deployment — Terraform Plan & Apply (OIDC)
# =============================================================================
# Two-job workflow with manual approval gate for apply.
#
# Job 1 (plan): Runs on all triggers — generates plan, posts summary to PR.
# Job 2 (apply): Runs only on main push, requires "production" environment
#                approval in GitHub repo settings.
#
# Uses OIDC federated credentials — zero stored secrets for Azure auth.
#
# Prerequisites:
#   1. GitHub Environment "production" with required reviewers configured
#   2. GitHub Secrets: AZURE_CICD_CLIENT_ID, AZURE_TENANT_ID, AZURE_SUBSCRIPTION_ID
# =============================================================================

name: Deploy Infrastructure

concurrency:
  group: azure-shared-env
  cancel-in-progress: false

on:
  push:
    branches:
      - main
      - 'feature/**'
    paths:
      - 'apps/*/infra/**'
      - '.github/workflows/deploy-infra.yml'
  pull_request:
    paths:
      - 'apps/*/infra/**'
      - '.github/workflows/deploy-infra.yml'
  workflow_dispatch:
    inputs:
      app-path:
        description: 'App directory relative to repo root'
        required: true
        type: string
        default: 'apps/sample-app'

permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  TF_VAR_FILE: dev.tfvars
  ARM_USE_OIDC: true
  ARM_USE_AZUREAD: true
  APP_PATH: ${{ inputs.app-path || 'apps/sample-app' }}

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Terraform Plan — runs on every trigger
  # ---------------------------------------------------------------------------
  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    environment: development

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CICD_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"

      - name: Terraform Init
        working-directory: ${{ env.APP_PATH }}/infra
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CICD_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: terraform init

      - name: Terraform Plan
        id: plan
        working-directory: ${{ env.APP_PATH }}/infra
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CICD_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          TF_VAR_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: |
          terraform plan -var-file="${{ env.TF_VAR_FILE }}" -out=tfplan -no-color 2>&1 | tee plan-output.txt
        continue-on-error: true

      - name: Upload plan artifact
        if: github.event_name == 'push' && steps.plan.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: ${{ env.APP_PATH }}/infra/tfplan
          retention-days: 1

      - name: Post plan to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const output = fs.readFileSync('${{ env.APP_PATH }}/infra/plan-output.txt', 'utf8');
            const planResult = '${{ steps.plan.outcome }}';

            const maxLen = 60000;
            const truncated = output.length > maxLen
              ? output.substring(0, maxLen) + '\n\n... (truncated)'
              : output;

            const body = `### Terraform Plan — \`${planResult}\`

            <details><summary>Show plan output</summary>

            \`\`\`
            ${truncated}
            \`\`\`

            </details>

            *Pushed by @${{ github.actor }} · Workflow: \`${{ github.workflow }}\`*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body,
            });

      - name: Fail if plan failed
        if: steps.plan.outcome == 'failure'
        run: exit 1

  # ---------------------------------------------------------------------------
  # Job 2a: Terraform Apply — main branch
  # ---------------------------------------------------------------------------
  apply:
    name: Terraform Apply (main)
    needs: plan
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: development

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CICD_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"

      - name: Terraform Init
        working-directory: ${{ env.APP_PATH }}/infra
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CICD_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: terraform init

      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: ${{ env.APP_PATH }}/infra/

      - name: Terraform Apply
        working-directory: ${{ env.APP_PATH }}/infra
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CICD_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          TF_VAR_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: terraform apply -auto-approve tfplan

  # ---------------------------------------------------------------------------
  # Job 2b: Terraform Apply — feature branches (no approval gate)
  # ---------------------------------------------------------------------------
  apply-feature:
    name: Terraform Apply (feature)
    needs: plan
    if: github.event_name == 'push' && github.ref != 'refs/heads/main' && startsWith(github.ref, 'refs/heads/feature/')
    runs-on: ubuntu-latest
    environment: development

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CICD_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"

      - name: Terraform Init
        working-directory: ${{ env.APP_PATH }}/infra
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CICD_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: terraform init

      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: ${{ env.APP_PATH }}/infra/

      - name: Terraform Apply
        working-directory: ${{ env.APP_PATH }}/infra
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CICD_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          TF_VAR_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: terraform apply -auto-approve tfplan
