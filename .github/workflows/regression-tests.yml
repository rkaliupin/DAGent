# =============================================================================
# Regression Tests — Integration + Playwright against live environment
# =============================================================================
# Read-only safety net that runs after deploy-backend, deploy-frontend, or
# deploy-infrastructure completes on main. Validates the live Azure
# environment hasn't regressed.
#
# Prerequisites:
#   - AZURE_CICD_CLIENT_ID, AZURE_TENANT_ID, AZURE_SUBSCRIPTION_ID (OIDC)
#   - FUNCTION_APP_URL, SWA_URL (GitHub Secrets)
#   - AZURE_FUNCTION_APP_NAME, AZURE_RESOURCE_GROUP (GitHub Variables)
# =============================================================================

name: Regression Tests

on:
  workflow_run:
    workflows:
      - "Deploy Backend"
      - "Deploy Frontend"
      - "Deploy Infrastructure"
    types: [completed]
    branches: [main]

permissions:
  id-token: write
  contents: read

env:
  APP_PATH: 'apps/sample-app'

jobs:
  # ---------------------------------------------------------------------------
  # Job 0: Detect what changed in the triggering commit
  # ---------------------------------------------------------------------------
  detect-changes:
    name: Detect Changed Paths
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    outputs:
      has_infra: ${{ steps.paths.outputs.has_infra }}
      has_frontend: ${{ steps.paths.outputs.has_frontend }}
      has_backend: ${{ steps.paths.outputs.has_backend }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Classify changed paths
        id: paths
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "")
          echo "Changed files:"
          echo "$CHANGED"

          has_infra=false
          has_frontend=false
          has_backend=false

          if echo "$CHANGED" | grep -q '^apps/.*/infra/'; then
            has_infra=true
          fi
          if echo "$CHANGED" | grep -qE '^apps/.*/(frontend|e2e)/'; then
            has_frontend=true
          fi
          if echo "$CHANGED" | grep -q '^apps/.*/backend/'; then
            has_backend=true
          fi

          echo "has_infra=$has_infra" >> "$GITHUB_OUTPUT"
          echo "has_frontend=$has_frontend" >> "$GITHUB_OUTPUT"
          echo "has_backend=$has_backend" >> "$GITHUB_OUTPUT"

  # ---------------------------------------------------------------------------
  # Job 1: Backend Integration Tests
  # ---------------------------------------------------------------------------
  integration-tests:
    name: Backend Integration Tests
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Login to Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CICD_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Retrieve Function App host key
        id: func-key
        run: |
          FUNC_KEY=$(az functionapp keys list \
            --name ${{ vars.AZURE_FUNCTION_APP_NAME }} \
            --resource-group ${{ vars.AZURE_RESOURCE_GROUP }} \
            --query 'functionKeys.default || masterKey' -o tsv)
          echo "::add-mask::$FUNC_KEY"
          echo "key=$FUNC_KEY" >> "$GITHUB_OUTPUT"

      - name: Run integration tests
        working-directory: ${{ env.APP_PATH }}/backend
        env:
          RUN_INTEGRATION: 'true'
          INTEGRATION_API_BASE_URL: ${{ secrets.FUNCTION_APP_URL }}/api
          INTEGRATION_FUNCTION_KEY: ${{ steps.func-key.outputs.key }}
        run: npm run test:integration

  # ---------------------------------------------------------------------------
  # Job 2: Playwright UI Validation
  # ---------------------------------------------------------------------------
  playwright-tests:
    name: Playwright UI Validation
    needs: detect-changes
    runs-on: ubuntu-latest
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      (
        github.event.workflow_run.name == 'Deploy Frontend' ||
        needs.detect-changes.outputs.has_infra == 'true'
      )

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        env:
          SWA_URL: ${{ secrets.SWA_URL }}
          FUNCTION_APP_URL: ${{ secrets.FUNCTION_APP_URL }}
        run: npx playwright test --config ${{ env.APP_PATH }}/playwright.config.ts
